name: Build & Release APK

on:
  push:
    branches: [main, master, claude/*]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle wrapper
        working-directory: android
        run: |
          mkdir -p gradle/wrapper
          curl -sL https://services.gradle.org/distributions/gradle-8.2-bin.zip -o /tmp/gradle.zip
          unzip -qo /tmp/gradle.zip -d /tmp/gradle
          /tmp/gradle/gradle-8.2/bin/gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug -PbuildNumber=${{ github.run_number }}

      # Release APK is signed with the persistent upload key so every build
      # installs OVER the previous one (debug builds get a fresh throwaway key
      # per CI runner — those can never update each other). The queue token is
      # baked in from the repo secret so installs need zero setup.
      - name: Build signed release APK + Play AAB
        if: ${{ github.ref == 'refs/heads/main' }}
        working-directory: android
        env:
          UPLOAD_KEYSTORE_B64: ${{ secrets.UPLOAD_KEYSTORE_B64 }}
          UPLOAD_KEYSTORE_PASS: ${{ secrets.UPLOAD_KEYSTORE_PASS }}
          PRINT_QUEUE_TOKEN: ${{ secrets.PRINT_QUEUE_TOKEN }}
        run: |
          if [ -n "$UPLOAD_KEYSTORE_B64" ]; then
            echo "$UPLOAD_KEYSTORE_B64" | base64 -d > /tmp/upload.jks
            UPLOAD_KEYSTORE_FILE=/tmp/upload.jks ./gradlew assembleRelease bundleRelease \
              -PbuildNumber=${{ github.run_number }} -PprintToken="$PRINT_QUEUE_TOKEN"
            DATE=$(date +'%Y-%m-%d')
            cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/Print-$DATE.apk
            cp app/build/outputs/bundle/release/app-release.aab app/build/outputs/bundle/release/Print-play-${{ github.run_number }}.aab
          else
            echo "No keystore secret — skipping signed builds"
          fi

      - name: Upload APKs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Print-APK
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/Print-*.apk
          retention-days: 90

      - name: Create Release
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Print Build #${{ github.run_number }}
          files: |
            android/app/build/outputs/apk/release/Print-*.apk
            android/app/build/outputs/bundle/release/Print-play-*.aab
          body: |
            Automatic build from commit ${{ github.sha }}

            Download the APK file below and install on your Android phone.
            The .aab file is the Play Store upload bundle.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
