name: Build & Release APK

on:
  push:
    branches: [main, master, claude/*]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle wrapper
        working-directory: android
        run: |
          mkdir -p gradle/wrapper
          curl -sL https://services.gradle.org/distributions/gradle-8.2-bin.zip -o /tmp/gradle.zip
          unzip -qo /tmp/gradle.zip -d /tmp/gradle
          /tmp/gradle/gradle-8.2/bin/gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug -PbuildNumber=${{ github.run_number }}

      - name: Rename APK with date
        run: |
          DATE=$(date +'%Y-%m-%d')
          cp android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/Print-$DATE.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Print-APK
          path: android/app/build/outputs/apk/debug/Print-*.apk
          retention-days: 90

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Print Build #${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/Print-*.apk
          body: |
            Automatic build from commit ${{ github.sha }}

            Download the APK file below and install on your Android phone.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
