name: Build & Release APK

on:
  push:
    branches: [main, master, claude/*]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Rename APK with date
        run: |
          DATE=$(date +'%Y-%m-%d')
          cp android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/iPrintScan-$DATE.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: iPrintScan-APK
          path: android/app/build/outputs/apk/debug/iPrintScan-*.apk
          retention-days: 90

      - name: Create Release
        if: always() && steps.build.outcome == 'success' || true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: iPrintScan Build #${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/iPrintScan-*.apk
          body: |
            Automatic build from commit ${{ github.sha }}

            Download the APK file below and install on your Android phone.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
