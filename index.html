<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>iPrint&Scan</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#007aff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
  <div class="app">
    <!-- Header: no title, back + edit(whiteout) buttons -->
    <header class="header">
      <button class="header-btn back-btn" aria-label="Back">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M15 18L9 12L15 6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <h1 class="header-title" id="headerTitle"></h1>
      <button class="header-btn" id="editBtn" aria-label="White-out tool">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M20 20H7L3 16C2.4 15.4 2.4 14.4 3 13.8L13.8 3C14.4 2.4 15.4 2.4 16 3L21 8C21.6 8.6 21.6 9.6 21 10.2L11.2 20" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M18 13L11 6" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </header>

    <!-- Edit Mode Banner (hidden until eraser tapped) -->
    <div id="editBanner" style="display:none;align-items:center;justify-content:space-between;padding:8px 16px;background:#fff3cd;color:#856404;font-size:13px;font-weight:500">
      <span>White-out: drag to cover text</span>
      <div style="display:flex;gap:8px">
        <button id="undoBtn" style="background:none;border:1px solid #b8860b;border-radius:6px;color:#856404;padding:4px 12px;font-size:12px;font-weight:600;cursor:pointer">Undo</button>
        <button id="doneEditBtn" style="background:#007aff;border:1px solid #007aff;border-radius:6px;color:#fff;padding:4px 12px;font-size:12px;font-weight:600;cursor:pointer">Done</button>
      </div>
    </div>

    <!-- Preview Area -->
    <main class="preview-area" id="previewArea">
      <div class="preview-wrapper" id="previewWrapper">
        <div class="label-container" id="labelContainer">
          <div class="shipping-label">
            <div class="label-section from-section">
              <div class="label-from-name">John Smith</div>
              <div class="label-from-addr">123 Sender Street</div>
              <div class="label-from-addr">New York, NY 10001</div>
            </div>
            <div class="label-section to-section">
              <div class="label-to-prefix">TO:</div>
              <div class="label-to-name">Jane Doe</div>
              <div class="label-to-addr">456 Receiver Ave, Apt 7B</div>
              <div class="label-to-addr">Los Angeles, CA 90001</div>
            </div>
            <div class="label-section barcode-section">
              <div class="barcode">
                <div class="barcode-bars">
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span><span></span>
                </div>
                <div class="barcode-number">9400 1234 5678 9000 0000 00</div>
              </div>
            </div>
            <div class="label-section service-section">
              <div class="service-badge">PRIORITY MAIL</div>
              <div class="label-weight">Weight: 2.5 lbs</div>
            </div>
          </div>
        </div>
        <canvas id="whiteoutCanvas" class="whiteout-canvas"></canvas>
      </div>
    </main>

    <!-- Zoom Controls -->
    <div class="zoom-controls">
      <button class="zoom-btn" id="zoomOut" aria-label="Zoom out">−</button>
      <span class="zoom-level" id="zoomLevel">100%</span>
      <button class="zoom-btn" id="zoomIn" aria-label="Zoom in">+</button>
    </div>

    <!-- Printer Info Bar -->
    <div class="printer-bar" id="printerBar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="4" fill="#34c759"/>
        <circle cx="12" cy="12" r="8" stroke="#34c759" stroke-width="1.5" opacity="0.3"/>
      </svg>
      <span class="printer-bar-text">Brother HL-B2080DW (auto-selects on WiFi)</span>
    </div>

    <!-- Settings: Layout + Copies -->
    <section class="settings-section">
      <div class="setting-row">
        <div class="setting-label">
          <svg class="setting-icon" width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="3" width="7" height="7" rx="1" stroke="#555" stroke-width="1.8"/>
            <rect x="14" y="3" width="7" height="7" rx="1" stroke="#555" stroke-width="1.8"/>
            <rect x="3" y="14" width="7" height="7" rx="1" stroke="#555" stroke-width="1.8"/>
            <rect x="14" y="14" width="7" height="7" rx="1" stroke="#555" stroke-width="1.8"/>
          </svg>
          <span>Layout</span>
        </div>
        <div class="setting-control">
          <select id="layoutSelect">
            <option value="1">1 per Sheet</option>
            <option value="2">2 per Sheet</option>
            <option value="3">3 per Sheet</option>
            <option value="4">4 per Sheet</option>
          </select>
          <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M6 9L12 15L18 9" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <div class="setting-divider"></div>

      <div class="setting-row">
        <div class="setting-label">
          <svg class="setting-icon" width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="8" y="2" width="12" height="16" rx="1.5" stroke="#555" stroke-width="1.8"/>
            <path d="M4 6H5.5C5.78 6 6 6.22 6 6.5V19.5C6 19.78 6.22 20 6.5 20H16" stroke="#555" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <span>Copies</span>
        </div>
        <div class="setting-control copies-control">
          <button class="copies-btn minus" id="copiesMinus" aria-label="Decrease copies">−</button>
          <span class="copies-value" id="copiesValue">1</span>
          <button class="copies-btn plus" id="copiesPlus" aria-label="Increase copies">+</button>
        </div>
      </div>
    </section>

    <!-- Print Button -->
    <div class="print-btn-container">
      <button class="print-btn" id="printBtn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" style="margin-right:8px">
          <path d="M6 9V2H18V9" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M6 18H4C2.9 18 2 17.1 2 16V11C2 9.9 2.9 9 4 9H20C21.1 9 22 9.9 22 11V16C22 17.1 21.1 18 20 18H18" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="6" y="14" width="12" height="8" rx="1" stroke="#fff" stroke-width="2"/>
        </svg>
        Print
      </button>
    </div>
  </div>

  <!-- Hidden: tiled print area populated by JS before printing -->
  <div id="printArea"></div>

  <script src="app.js"></script>
</body>
</html>
