<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Print</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f2f2f7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
  <div class="app">

    <input type="file" id="fileInput" accept=".pdf,image/*,application/pdf" style="position:fixed;top:-9999px;left:-9999px;opacity:0">

    <!-- Preview Area: touch to white-out, pinch to zoom -->
    <main class="preview-area" id="previewArea">
      <div class="preview-wrapper" id="previewWrapper">
        <div class="label-container" id="labelContainer">
          <div class="shipping-label">
            <div class="label-section from-section">
              <div class="label-from-name">John Smith</div>
              <div class="label-from-addr">123 Sender Street</div>
              <div class="label-from-addr">New York, NY 10001</div>
            </div>
            <div class="label-section to-section">
              <div class="label-to-prefix">TO:</div>
              <div class="label-to-name">Jane Doe</div>
              <div class="label-to-addr">456 Receiver Ave, Apt 7B</div>
              <div class="label-to-addr">Los Angeles, CA 90001</div>
            </div>
            <div class="label-section barcode-section">
              <div class="barcode">
                <div class="barcode-bars">
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span><span></span>
                </div>
                <div class="barcode-number">9400 1234 5678 9000 0000 00</div>
              </div>
            </div>
            <div class="label-section service-section">
              <div class="service-badge">PRIORITY MAIL</div>
              <div class="label-weight">Weight: 2.5 lbs</div>
            </div>
          </div>
        </div>
        <canvas id="whiteoutCanvas" style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:5;border-radius:6px;touch-action:pan-y;pointer-events:none;cursor:default"></canvas>
      </div>
    </main>

    <!-- Floating Eraser toggle + Undo button -->
    <button id="eraserToggle" class="eraser-toggle" title="Toggle Eraser">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 20H7L3 16C2.4 15.4 2.4 14.6 3 14L13 4L20 11L12 19"/>
        <path d="M13 4L20 11"/>
      </svg>
    </button>
    <button id="undoBtn" style="display:none;position:fixed;bottom:230px;right:16px;width:44px;height:44px;border-radius:50%;background:#fff;border:1px solid #ddd;box-shadow:0 2px 8px rgba(0,0,0,0.15);align-items:center;justify-content:center;font-size:18px;cursor:pointer;z-index:20">&#8617;</button>

    <!-- Eraser thickness: 1 2 3 4 -->
    <div class="thickness-bar" id="thicknessBar">
      <button class="thick-btn" data-size="0"><span class="thick-dot" style="width:6px;height:6px"></span></button>
      <button class="thick-btn active" data-size="1"><span class="thick-dot" style="width:10px;height:10px"></span></button>
      <button class="thick-btn" data-size="2"><span class="thick-dot" style="width:16px;height:16px"></span></button>
      <button class="thick-btn" data-size="3"><span class="thick-dot" style="width:22px;height:22px"></span></button>
    </div>

    <!-- Sticky Bottom: Printer bar + Layout row + Print button -->
    <div class="bottom-bar">
      <!-- Printer Info Bar -->
      <div class="printer-bar">
        <span class="printer-dot" id="printerDot"></span>
        <span class="printer-bar-text" id="printerText">Brother HL-B2080DW</span>
      </div>

      <!-- Layout + Open File + Download + Share -->
      <section class="settings-section">
        <div class="setting-row">
          <div class="action-buttons">
            <button id="openFileBtn" class="open-file-icon" title="Open File">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M14 2H6C4.9 2 4 2.9 4 4V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V8L14 2Z" stroke="#007aff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 2V8H20" stroke="#007aff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button id="downloadBtn" class="open-file-icon" title="Download PDF">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M21 15V19C21 20.1 20.1 21 19 21H5C3.9 21 3 20.1 3 19V15" stroke="#007aff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 10L12 15L17 10" stroke="#007aff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 15V3" stroke="#007aff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button id="shareBtn" class="open-file-icon" title="Share PDF">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 12V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V12" stroke="#007aff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M16 6L12 2L8 6" stroke="#007aff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 2V15" stroke="#007aff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button id="duplexBtn" class="open-file-icon duplex-btn" title="Both Side Print">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="#007aff" stroke-width="2"/><line x1="12" y1="3" x2="12" y2="21" stroke="#007aff" stroke-width="1.5" stroke-dasharray="2 2"/><text x="7" y="14" font-size="8" font-weight="700" fill="#007aff" text-anchor="middle">A</text><text x="17" y="14" font-size="8" font-weight="700" fill="#007aff" text-anchor="middle">B</text></svg>
            </button>
            <button id="dashBtn" class="open-file-icon" title="Dashboard" style="display:none">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="12" rx="2" stroke="#007aff" stroke-width="2"/><path d="M8 20H16" stroke="#007aff" stroke-width="2" stroke-linecap="round"/><path d="M12 16V20" stroke="#007aff" stroke-width="2" stroke-linecap="round"/><path d="M7 10L10 13L13 8L15 11" stroke="#007aff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
          <div class="setting-control">
            <select id="layoutSelect">
              <option value="1">1 per Sheet</option>
              <option value="2">2 per Sheet</option>
              <option value="3">3 per Sheet</option>
              <option value="4">4 per Sheet</option>
            </select>
            <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M6 9L12 15L18 9" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
      </section>

      <!-- Print Button -->
      <div class="print-btn-container">
        <button class="print-btn" id="printBtn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" style="margin-right:8px">
            <path d="M6 9V2H18V9" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M6 18H4C2.9 18 2 17.1 2 16V11C2 9.9 2.9 9 4 9H20C21.1 9 22 9.9 22 11V16C22 17.1 21.1 18 20 18H18" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="6" y="14" width="12" height="8" rx="1" stroke="#fff" stroke-width="2"/>
          </svg>
          Print
        </button>
      </div>
    </div>

  </div>

  <!-- Hidden: tiled print area -->
  <div id="printArea"></div>

  <!-- Dashboard modal: direct child of body with inline-critical styles so it
       renders full-size even if styles.css is stale or an ancestor clips -->
  <div id="dashModal" class="dash-overlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);align-items:center;justify-content:center;z-index:2147483000;padding:16px;box-sizing:border-box;">
    <div class="dash-card" style="background:#fff;border-radius:16px;padding:20px;width:100%;max-width:420px;max-height:88vh;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,0.25);box-sizing:border-box;">
      <div class="dash-title" style="font-size:18px;font-weight:600;color:#111;margin-bottom:14px;">&#128424; Dashboard</div>
      <label class="dash-label" for="dashWodUrl" style="display:block;font-size:13px;color:#555;margin:10px 0 4px;">WOD URL</label>
      <input id="dashWodUrl" class="dash-input" type="url" placeholder="https://track.sale91.com" autocapitalize="off" autocorrect="off" spellcheck="false" style="display:block;width:100%;box-sizing:border-box;padding:11px 12px;font-size:16px;border:1px solid #ccc;border-radius:9px;">
      <label class="dash-label" for="dashToken" style="display:block;font-size:13px;color:#555;margin:10px 0 4px;">Token</label>
      <input id="dashToken" class="dash-input" type="password" placeholder="Access token" style="display:block;width:100%;box-sizing:border-box;padding:11px 12px;font-size:16px;border:1px solid #ccc;border-radius:9px;">
      <label class="dash-label" for="dashPrinterIp" style="display:block;font-size:13px;color:#555;margin:10px 0 4px;">Printer IP</label>
      <input id="dashPrinterIp" class="dash-input" type="text" placeholder="192.168.1.112" autocapitalize="off" autocorrect="off" spellcheck="false" style="display:block;width:100%;box-sizing:border-box;padding:11px 12px;font-size:16px;border:1px solid #ccc;border-radius:9px;">
      <div class="dash-toggle-row" style="display:flex;align-items:center;justify-content:space-between;margin:16px 0 6px;font-size:15px;color:#222;">
        <span>Auto-print dashboard jobs</span>
        <label class="dash-switch">
          <input id="dashEnabled" type="checkbox" style="width:22px;height:22px;">
          <span class="dash-knob"></span>
        </label>
      </div>
      <div id="dashPing" class="dash-ping" style="min-height:18px;font-size:13px;margin:6px 0;"></div>
      <div class="dash-btn-row" style="display:flex;gap:10px;margin-top:10px;">
        <button id="dashTestBtn" class="dash-btn secondary" style="flex:1;padding:12px;font-size:15px;border-radius:10px;border:1px solid #ccc;background:#f4f4f6;color:#111;">Test</button>
        <button id="dashUpdateBtn" class="dash-btn secondary" style="flex:1;padding:12px;font-size:15px;border-radius:10px;border:1px solid #ccc;background:#f4f4f6;color:#111;">Check update</button>
      </div>
      <div id="dashStatus" class="dash-status" style="min-height:18px;font-size:13px;color:#666;margin:8px 0;"></div>
      <div class="dash-btn-row" style="display:flex;gap:10px;margin-top:6px;">
        <button id="dashCloseBtn" class="dash-btn secondary" style="flex:1;padding:12px;font-size:15px;border-radius:10px;border:1px solid #ccc;background:#f4f4f6;color:#111;">Close</button>
        <button id="dashSaveBtn" class="dash-btn primary" style="flex:1;padding:12px;font-size:15px;border-radius:10px;border:0;background:#0a84ff;color:#fff;font-weight:600;">Save</button>
      </div>
    </div>
  </div>

  <!-- Fix WebView height: set pixels before overflow:hidden clips content -->
  <script>
  (function(){
    var a=document.querySelector('.app');
    if(a){
      var h=window.innerHeight||document.documentElement.clientHeight||0;
      if(h>0){a.style.height=h+'px';a.style.overflow='hidden';}
    }
  })();
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    try{pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';}catch(e){}
  </script>
  <script src="app.js"></script>
</body>
</html>
