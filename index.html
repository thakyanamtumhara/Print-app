<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>iPrint&Scan</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f2f2f7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
  <div class="app">

    <!-- Open File button -->
    <div style="padding:12px 20px 0;display:flex">
      <button id="openFileBtn" style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;background:#fff;border:1.5px dashed #c7c7cc;border-radius:10px;font-size:14px;font-weight:500;color:#007aff;cursor:pointer">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M14 2H6C4.9 2 4 2.9 4 4V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V8L14 2Z" stroke="#007aff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 2V8H20" stroke="#007aff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Open File
      </button>
      <input type="file" id="fileInput" accept=".pdf,image/*,application/pdf" style="position:fixed;top:-9999px;left:-9999px;opacity:0">
    </div>

    <!-- Preview Area: touch to white-out, pinch to zoom -->
    <main class="preview-area" id="previewArea">
      <div class="preview-wrapper" id="previewWrapper">
        <div class="label-container" id="labelContainer">
          <div class="shipping-label">
            <div class="label-section from-section">
              <div class="label-from-name">John Smith</div>
              <div class="label-from-addr">123 Sender Street</div>
              <div class="label-from-addr">New York, NY 10001</div>
            </div>
            <div class="label-section to-section">
              <div class="label-to-prefix">TO:</div>
              <div class="label-to-name">Jane Doe</div>
              <div class="label-to-addr">456 Receiver Ave, Apt 7B</div>
              <div class="label-to-addr">Los Angeles, CA 90001</div>
            </div>
            <div class="label-section barcode-section">
              <div class="barcode">
                <div class="barcode-bars">
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span><span></span>
                </div>
                <div class="barcode-number">9400 1234 5678 9000 0000 00</div>
              </div>
            </div>
            <div class="label-section service-section">
              <div class="service-badge">PRIORITY MAIL</div>
              <div class="label-weight">Weight: 2.5 lbs</div>
            </div>
          </div>
        </div>
        <canvas id="whiteoutCanvas" style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:5;border-radius:6px;touch-action:none;pointer-events:none;cursor:crosshair"></canvas>
      </div>
    </main>

    <!-- Floating Undo button (appears after drawing) -->
    <button id="undoBtn" style="display:none;position:fixed;bottom:220px;right:16px;width:44px;height:44px;border-radius:50%;background:#fff;border:1px solid #ddd;box-shadow:0 2px 8px rgba(0,0,0,0.15);align-items:center;justify-content:center;font-size:18px;cursor:pointer;z-index:20">&#8617;</button>

    <!-- Eraser Toolbar: toggle + thickness -->
    <div class="eraser-toolbar">
      <button class="eraser-toggle" id="eraserToggle">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M20 20H7L3 16C2.4 15.4 2.4 14.4 3 13.8L13.8 3C14.4 2.4 15.4 2.4 16 3L21 8C21.6 8.6 21.6 9.6 21 10.2L11.2 20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Eraser
      </button>
      <div class="thickness-bar" id="thicknessBar" style="display:none">
        <button class="thick-btn" data-size="0"><span class="thick-dot" style="width:6px;height:6px"></span></button>
        <button class="thick-btn active" data-size="1"><span class="thick-dot" style="width:10px;height:10px"></span></button>
        <button class="thick-btn" data-size="2"><span class="thick-dot" style="width:16px;height:16px"></span></button>
        <button class="thick-btn" data-size="3"><span class="thick-dot" style="width:22px;height:22px"></span></button>
      </div>
    </div>

    <!-- Printer Info Bar -->
    <div class="printer-bar">
      <span class="printer-dot" id="printerDot"></span>
      <span class="printer-bar-text" id="printerText">Brother HL-B2080DW</span>
    </div>

    <!-- Settings: Layout + Copies -->
    <section class="settings-section">
      <div class="setting-row">
        <div class="setting-label">
          <svg class="setting-icon" width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="3" width="7" height="7" rx="1" stroke="#555" stroke-width="1.8"/>
            <rect x="14" y="3" width="7" height="7" rx="1" stroke="#555" stroke-width="1.8"/>
            <rect x="3" y="14" width="7" height="7" rx="1" stroke="#555" stroke-width="1.8"/>
            <rect x="14" y="14" width="7" height="7" rx="1" stroke="#555" stroke-width="1.8"/>
          </svg>
          <span>Layout</span>
        </div>
        <div class="setting-control">
          <select id="layoutSelect">
            <option value="1">1 per Sheet</option>
            <option value="2">2 per Sheet</option>
            <option value="3">3 per Sheet</option>
            <option value="4">4 per Sheet</option>
          </select>
          <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M6 9L12 15L18 9" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <div class="setting-divider"></div>

      <div class="setting-row">
        <div class="setting-label">
          <svg class="setting-icon" width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="8" y="2" width="12" height="16" rx="1.5" stroke="#555" stroke-width="1.8"/>
            <path d="M4 6H5.5C5.78 6 6 6.22 6 6.5V19.5C6 19.78 6.22 20 6.5 20H16" stroke="#555" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <span>Copies</span>
        </div>
        <div class="setting-control copies-control">
          <button class="copies-btn minus" id="copiesMinus" aria-label="Decrease copies">−</button>
          <span class="copies-value" id="copiesValue">1</span>
          <button class="copies-btn plus" id="copiesPlus" aria-label="Increase copies">+</button>
        </div>
      </div>
    </section>

    <!-- Print Button -->
    <div class="print-btn-container">
      <button class="print-btn" id="printBtn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" style="margin-right:8px">
          <path d="M6 9V2H18V9" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M6 18H4C2.9 18 2 17.1 2 16V11C2 9.9 2.9 9 4 9H20C21.1 9 22 9.9 22 11V16C22 17.1 21.1 18 20 18H18" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="6" y="14" width="12" height="8" rx="1" stroke="#fff" stroke-width="2"/>
        </svg>
        Print
      </button>
    </div>
  </div>

  <!-- Hidden: tiled print area -->
  <div id="printArea"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>
  <script src="app.js"></script>
</body>
</html>
